<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин микрозелени</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-them-bg-color);
            margin: 0;
            padding: 20px;
            color: var(--tg-them-text-color);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .product {
            width: calc(33% - 20px);
            margin-bottom: 20px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 5px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .product:hover {
            transform: scale(1.05);
        }
        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .product-info {
            padding: 15px;
        }
        .product-name {
            font-size: 18px;
            margin: 0 0 10px;
            color: #333;
        }
        .product-price {
            font-size: 16px;
            color: #777;
        }
        .buy-button {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            text-align: center;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .buy-button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Магазин микрозелени</h1>
        <div class="products">
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=Рукола" alt="Рукола">
                <div class="product-info">
                    <div class="product-name">Рукола</div>
                    <div class="product-price">500 ₽</div>
                    <a href="#" class="buy-button">Купить</a>
                </div>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=Салат+Айсберг" alt="Салат Айсберг">
                <div class="product-info">
                    <div class="product-name">Салат Айсберг</div>
                    <div class="product-price">450 ₽</div>
                    <a href="#" class="buy-button">Купить</a>
                </div>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=Петрушка" alt="Петрушка">
                <div class="product-info">
                    <div class="product-name">Петрушка</div>
                    <div class="product-price">300 ₽</div>
                    <a href="#" class="buy-button">Купить</a>
                </div>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=Укроп" alt="Укроп">
                <div class="product-info">
                    <div class="product-name">Укроп</div>
                    <div class="product-price">250 ₽</div>
                    <a href="#" class="buy-button">Купить</a>
                </div>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=Базилик" alt="Базилик">
                <div class="product-info">
                    <div class="product-name">Базилик</div>
                    <div class="product-price">400 ₽</div>
                    <a href="#" class="buy-button">Купить</a>
                </div>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=Лимонный+дерево" alt="Лимонное дерево">
                <div class="product-info">
                    <div class="product-name">Лимонное дерево</div>
                    <div class="product-price">1500 ₽</div>
                    <a href="#" class="buy-button">Купить</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.querySelectorAll('.buy-button').forEach(button => {
            button.addEventListener('click', function(event) {
                event.preventDefault();
                alert('Спасибо за покупку! Мы скоро свяжемся с вами.');
            });
        });
    </script>
</body>
</html>
